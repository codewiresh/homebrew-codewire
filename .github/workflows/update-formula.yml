name: Update Formula
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.2.86)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh release download ${{ inputs.version }} \
            --repo codewiresh/codewire \
            --pattern SHA256SUMS \
            --output SHA256SUMS

      - name: Update formula
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 <<'PYEOF'
          import os, re

          checksums = {}
          with open("SHA256SUMS") as f:
              for line in f:
                  sha, name = line.strip().split(None, 1)
                  m = re.search(r'((?:aarch64|x86_64)-[^\s]+)', name)
                  if m:
                      checksums[m.group(1)] = sha

          for target in ["aarch64-apple-darwin", "x86_64-apple-darwin",
                         "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]:
              if len(checksums.get(target, "")) != 64:
                  raise SystemExit(f"Invalid checksum for {target}")

          version = os.environ["VERSION"].lstrip("v")
          with open("Formula/codewire.rb") as f:
              lines = f.readlines()

          new_lines = []
          current_target = None
          for line in lines:
              if re.match(r'\s*version\s+"', line):
                  line = re.sub(r'version\s+"[^"]+"', f'version "{version}"', line)
              url_match = re.search(r'cw-v[^"]*-((?:aarch64|x86_64)-[^"]+)', line)
              if url_match:
                  current_target = url_match.group(1)
              if current_target and re.match(r'\s*sha256\s+"', line):
                  if current_target in checksums:
                      line = re.sub(r'sha256\s+"[0-9a-f]{64}"',
                                    f'sha256 "{checksums[current_target]}"', line)
                  current_target = None
              new_lines.append(line)

          with open("Formula/codewire.rb", "w") as f:
              f.writelines(new_lines)
          print(f"Updated to {version}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/codewire.rb
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "brew: update codewire to ${{ inputs.version }}"
          git push origin main
